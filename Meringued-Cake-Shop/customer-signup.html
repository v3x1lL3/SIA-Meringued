<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Sign Up - Meringued</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        :root { --gold: #D4AF37; --dark-gold: #B8860B; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-display { font-family: 'Playfair Display', serif; }
        .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%); }
        .input-field:focus { outline: none; border-color: var(--gold); }
    </style>
</head>
<body class="bg-[#FFF8F0] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <a href="index.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-[#D4AF37] text-sm mb-6 transition">
            <i class="fas fa-arrow-left"></i> Back to home
        </a>
        <div class="bg-white rounded-2xl shadow-xl border-2 border-[#D4AF37]/20 p-8">
            <div class="flex justify-center mb-6">
                <div class="w-14 h-14 rounded-full flex items-center justify-center bg-[#D4AF37]/20 text-[#D4AF37]">
                    <i class="fas fa-user-plus text-2xl"></i>
                </div>
            </div>
            <h1 class="font-display text-2xl font-bold text-center text-[#D4AF37] mb-2">Customer Sign Up</h1>
            <p class="text-center text-gray-600 text-sm mb-6">Create your account to start ordering.</p>

            <form id="customerSignupForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-1 font-medium text-sm">Full Name</label>
                    <input type="text" id="signupName" class="input-field w-full px-4 py-3 rounded-lg border-2 border-gray-200" placeholder="Enter your full name" required>
                </div>
                <div>
                    <label class="block text-gray-700 mb-1 font-medium text-sm">Email</label>
                    <input type="email" id="signupEmail" class="input-field w-full px-4 py-3 rounded-lg border-2 border-gray-200" placeholder="Enter your email" required>
                </div>
                <div>
                    <label class="block text-gray-700 mb-1 font-medium text-sm">Password</label>
                    <input type="password" id="signupPassword" class="input-field w-full px-4 py-3 rounded-lg border-2 border-gray-200" placeholder="Create a password" required>
                </div>
                <div>
                    <label class="block text-gray-700 mb-1 font-medium text-sm">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" class="input-field w-full px-4 py-3 rounded-lg border-2 border-gray-200" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn-gold w-full py-3 rounded-lg font-semibold text-white hover:opacity-90 transition shadow-lg">
                    <i class="fas fa-user-plus mr-2"></i>Create account
                </button>
            </form>

            <p class="text-center text-gray-500 text-sm mt-6">
                Already have an account? <a href="customer-login.html" class="text-[#D4AF37] font-medium hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        window._authSignupRole = 'customer';
    </script>
    <script type="module" src="js/controllers/authController.js"></script>
</body>
</html>
